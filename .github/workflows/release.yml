name: 'Release Tauri App'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build sleepguard-guard (Linux companion)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cargo build --release -p sleepguard-guard --manifest-path src-tauri/Cargo.toml
          cp src-tauri/target/release/sleepguard-guard installer/linux/sleepguard-guard
          chmod +x installer/linux/sleepguard-guard
          ls -la installer/linux/

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: sleepguard-v__VERSION__
          releaseName: 'SleepGuard v__VERSION__'
          releaseBody: |
            ¡Hola! 👋 Esta es una nueva versión de **SleepGuard**, la app de escritorio que te ayuda a poner límites reales de horario a tu computador: define cuándo se apaga y cuándo puede volver a encenderse, y ella se encarga del resto — sin clics extra, sin depender de que te acuerdes.

            Descarga el instalador de tu sistema operativo más abajo en **Assets** 👇 (Windows: `.exe` / `.msi` · Linux: `.deb` / `.AppImage`). En Linux también está el binario `sleepguard-guard` del agente de arranque.

            ### ✨ Novedades de esta versión

            - 🛡️ **Agente de arranque**: al activar el servicio puedes instalar el guard con permisos de administrador (o desde Configuración avanzada). Detecta si el equipo se enciende antes de la hora de activación y aplica el bloqueo. Sin el agente instalado, la hora de activación queda bloqueada en la UI.
            - 🚀 **Monitor persistente**: al cerrar la ventana la app sigue en la bandeja del sistema; al activar el servicio se registra al inicio de sesión (XDG en Linux / Task Scheduler en Windows) y puede arrancar en segundo plano sin molestar.
            - 🔒 **Lockscreen antes del apagado**: unos 30 segundos antes de la hora configurada aparece la pantalla de bloqueo con cuenta regresiva y, al llegar a 0, se apaga de inmediato.
            - 🛠️ **Apagado más fiable**: el motor ya no se pierde el momento exacto del apagado por cortes de tick o suspensión; compara contra la hora objetivo en lugar de depender solo del tiempo restante.
            - 🧭 **Ventanas de acercamiento y bloqueo**: la lógica considera apagado y activación juntos (también horarios nocturnos como 23:30 → 07:00), para saber cuándo avisar, bloquear o dejar pasar.
            - 🧹 **Lockscreen más claro**: la UI distingue mejor el bloqueo por arranque temprano del de apagado programado, y puede cerrar la pantalla cuando toca sin quedarse colgada.
            - ⏸️ **Servicio pausado por defecto**: la configuración arranca en apagado/pausado, para que actives el servicio cuando estés listo y no por sorpresa.

            ---

            📄 Consulta el [changelog](../../commits/main) para el detalle completo de cambios.

            ¡Gracias por usar SleepGuard!
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attach sleepguard-guard to release (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tauri_build.outputs.appVersion }}"
          if [ -z "$VERSION" ]; then
            echo "No appVersion from tauri-action; skip upload"
            exit 0
          fi
          gh release upload "sleepguard-v${VERSION}" \
            src-tauri/target/release/sleepguard-guard \
            --clobber
