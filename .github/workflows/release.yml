name: 'Release Tauri App'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build sleepguard-guard (Linux companion)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cargo build --release -p sleepguard-guard --manifest-path src-tauri/Cargo.toml
          cp src-tauri/target/release/sleepguard-guard installer/linux/sleepguard-guard
          chmod +x installer/linux/sleepguard-guard
          ls -la installer/linux/

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: sleepguard-v__VERSION__
          releaseName: 'SleepGuard v__VERSION__'
          releaseBody: |
            ¡Hola! 👋 Esta es **SleepGuard v1.1.1**, un parche sobre 1.1.0 para que el agente de arranque funcione bien en los instaladores publicados.

            Descarga el instalador de tu sistema operativo más abajo en **Assets** 👇 (Windows: `.exe` / `.msi` · Linux: `.deb` / `.AppImage`). En Linux también está el binario `sleepguard-guard` del agente de arranque.

            ### 🔧 Correcciones en v1.1.1

            - 🛡️ **Instalar agente de arranque en el release**: la app ya encuentra `install-guard.sh` / `sleepguard-guard` (y el script de Windows) dentro del paquete, en la ruta real de recursos de Tauri (`_up_/installer/...`). En 1.1.0 solo funcionaba en desarrollo.
            - 📣 **Errores más claros**: si la instalación del agente falla, la UI muestra el mensaje concreto en lugar de un aviso genérico.

            ### ✨ Lo que ya traía v1.1.0

            - Monitor persistente en bandeja + autostart de sesión
            - Lockscreen 30 s antes del apagado programado
            - Apagado más fiable y ventanas de acercamiento/bloqueo (incluye horarios nocturnos)
            - Servicio pausado por defecto

            ---

            📄 Consulta el [changelog](../../commits/main) para el detalle completo de cambios.

            ¡Gracias por usar SleepGuard!
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attach sleepguard-guard to release (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tauri_build.outputs.appVersion }}"
          if [ -z "$VERSION" ]; then
            echo "No appVersion from tauri-action; skip upload"
            exit 0
          fi
          gh release upload "sleepguard-v${VERSION}" \
            src-tauri/target/release/sleepguard-guard \
            --clobber
