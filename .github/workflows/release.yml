name: 'Release Tauri App'

on:
  push:
    tags:
      - 'v*' # Se activará al hacer push de un tag que empiece con v (ej. v1.0.0)
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build-and-release:
    permissions:
      contents: write # Necesario para poder crear el "Release" y subir los archivos
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04' # Linux (.deb y .AppImage)
            args: ''
          - platform: 'windows-latest' # Windows (.exe y .msi)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: sleepguard-v__VERSION__ # tauri-action reemplaza __VERSION__ por la versión de la app
          releaseName: 'SleepGuard v__VERSION__'
          releaseBody: |
            ¡Hola! 👋 Esta es una nueva versión de **SleepGuard**, la app de escritorio que te ayuda a poner límites reales de horario a tu computador: define cuándo se apaga y cuándo puede volver a encenderse, y ella se encarga del resto — sin clics extra, sin depender de que te acuerdes.

            Descarga el instalador de tu sistema operativo más abajo en **Assets** 👇 (Windows: `.exe` / `.msi` · Linux: `.deb` / `.AppImage`).

            ### ✨ Novedades de esta versión

            - 🔔 **Aviso previo al apagado**: notificación nativa del sistema 15 minutos antes de la hora configurada, con la hora exacta de apagado.
            - 🔒 **Bloqueo por arranque temprano**: si el equipo se enciende antes de la hora de activación del día, se muestra un aviso a pantalla completa y el equipo vuelve a apagarse automáticamente.
            - 🚀 **Inicio automático**: el servicio de monitoreo y el agente de arranque se registran solos al instalar (systemd en Linux, Task Scheduler en Windows), sin configuración manual.
            - 🧭 **Onboarding inicial**: al primer inicio, la app detecta tu sistema operativo y te pide confirmarlo antes de pasar a la configuración de horarios.
            - 🛡️ **Mejoras en el motor de apagado**: el cálculo del próximo apagado ahora es más robusto, evitando que se pierdan apagados por cortes de tick o suspensión del equipo.
            - ✅ **Validación de horarios**: los campos de hora ahora limitan correctamente los valores fuera de rango (horas > 23, minutos > 59) tanto en la pantalla principal como en la avanzada.
            - 🔐 **Configuración más segura**: el archivo de configuración local se guarda con permisos restringidos.

            ---

            📄 Consulta el [changelog](../../commits/main) para el detalle completo de cambios.

            ¡Gracias por usar SleepGuard!
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
